# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "35955a16279cc26f320c8a9d3d422097"
name = "BargainBot"
application_url = "https://bargain-bot.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_products,write_discounts,write_products"

[auth]
redirect_urls = [
  "https://bargain-bot.vercel.app/auth/callback",
  "https://bargain-bot.vercel.app/auth/shopify/callback",
  "https://bargain-bot.vercel.app/api/auth/callback"
]

[app_proxy]
url = "https://bargain-bot.vercel.app/app-proxy"
subpath = "bargainbot"
prefix = "apps"
